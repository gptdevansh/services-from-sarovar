name: Deploy to Hostinger FTP

on:
  push:
    branches:
      - main
      - master # Triggers on push to main or master

jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4
    
    - name: ⚙️ Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20' # Matching the version from your package.json
        cache: 'npm'
        
    - name: 📦 Install Dependencies
      run: npm ci
      
    - name: 🏗️ Build Project
      run: npm run build
      
    - name: 📂 Sync files to Hostinger
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./out/
        server-dir: ./ # Since your FTP account drops you directly into public_html
        dangerous-clean-slate: true # Deletes old files before uploading new ones
